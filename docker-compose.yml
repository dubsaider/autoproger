services:
  backend:
    build: .
    env_file:
      - .env
    volumes:
      - autoproger_data:/app/data
      - claude_auth:/root/.claude
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "9000:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoproger
      POSTGRES_USER: autoproger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoproger}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  autoproger_data:
  pg_data:
  claude_auth:
